version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: job-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: job-redis
    command: ["redis-server", "--maxmemory", "80mb", "--maxmemory-policy", "allkeys-lru"]
    restart: always
    mem_limit: 100m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build: .
    container_name: job-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always
    mem_limit: 300m

  worker:
    build: .
    container_name: job-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=1",
        "--pool=solo"
      ]
    restart: always
    mem_limit: 700m

  scheduler:
    build: .
    container_name: job-scheduler
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app:celery_app",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule"
      ]
    restart: always
    mem_limit: 200m

volumes:
  postgres_data: