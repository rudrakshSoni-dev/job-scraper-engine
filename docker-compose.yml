services:
  postgres:
    image: postgres:15
    container_name: job-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: job-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    container_name: job-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always

  worker:
    build: .
    container_name: job-worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=4
    restart: always

  scheduler:
    build: .
    container_name: job-scheduler
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: >
      celery -A app.core.celery_app:celery_app beat
      --loglevel=info
    restart: always

volumes:
  postgres_data: